name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: All five project test suites
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain installs ─────────────────────────────────────────────
      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install Quicklisp (one-time, cached via .sbclrc)
        run: |
          curl -s -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval "(let ((ql-util::*do-not-prompt* t))(ql:add-to-init-file))"
          rm quicklisp.lisp

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: 1.12.0.1530

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-

      - name: Install BaseX
        run: |
          curl -L -o basex.zip https://files.basex.org/releases/12.0/BaseX120.zip
          sudo unzip -q basex.zip -d /opt
          sudo ln -sf /opt/basex/bin/basex /usr/local/bin/basex
          rm basex.zip
          basex -V

      # ── Verification ──────────────────────────────────────────────────
      - name: Verify toolchain
        run: |
          sbcl --version
          java -version
          clojure --version
          basex -V

      - name: make test
        run: make test

      - name: make e2e
        run: make e2e

      - name: make bench-06 (informational, never fails the build)
        run: make bench-06 || true

  docker:
    name: Build adjudis-core container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: 06-adjudis-core
          file: 06-adjudis-core/Dockerfile
          push: false
          load: true               # load into docker daemon so `docker run` finds it
          tags: adjudis-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container starts and /health responds
        run: |
          docker run -d --rm --name adj -p 8080:8080 adjudis-core:ci
          # JVM cold start is slow on CI; poll for up to 90s.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Container is healthy after ${i}*3s"
              curl -s http://localhost:8080/health
              echo
              curl -s http://localhost:8080/version
              echo
              docker stop adj
              exit 0
            fi
            sleep 3
          done
          echo "Container failed to become healthy"
          docker logs adj
          docker stop adj
          exit 1
